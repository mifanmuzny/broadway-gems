<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Broadway Gems | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0a0a0a, #000000 70%);
    color: #ffffff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* subtle gold glow */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(212,175,55,0.15), transparent 70%);
    top: -100px;
    right: -100px;
}

/* container */
.container {
    max-width: 600px;
    padding: 20px;
}

/* logo */
.logo {
    width: 180px;
    margin-bottom: 20px;
}

/* heading */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: #d4af37;
}

/* sub text */
.sub {
    margin-top: 10px;
    font-size: 14px;
    letter-spacing: 2px;
    color: #aaa;
}

/* description */
.desc {
    margin: 20px 0 30px;
    font-size: 15px;
    color: #ccc;
}

/* contact box */
.contact-box {
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 12px;
    padding: 20px;
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(10px);
}

/* links */
.contact-box a {
    display: block;
    margin: 10px 0;
    color: #d4af37;
    text-decoration: none;
    transition: 0.3s;
}

.contact-box a:hover {
    color: #fff;
}

/* footer */
.footer {
    margin-top: 25px;
    font-size: 13px;
    color: #777;
}
</style>

</head>

<body>

<div class="container">

    <img src="logo.png" alt="Broadway Gems Logo" class="logo">

    <h1>COMING SOON</h1>
    <div class="sub">WEBSITE UNDER CONSTRUCTION</div>

    <p class="desc">
        We are building a premium gemstone experience. Stay connected with us.
    </p>

    <div class="contact-box">
        <a href="https://wa.me/94773278596">WhatsApp: +94 77 327 8596</a>
        <a href="https://web.facebook.com/BroadwayGemss/">Facebook</a>
        <a href="https://www.tiktok.com/@broadwaygemss">TikTok</a>
        <a href="mailto:broadwaygemskl@gmail.com">broadwaygemskl@gmail.com</a>
    </div>

    <div class="footer">
        © 2026 Broadway Gems. All rights reserved.
    </div>

</div>

</body>
</html>
