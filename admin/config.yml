backend:
  name: github
  repo: mifanmuzny/broadway-gems
  branch: main
  base_url: https://sveltia-cms-auth.mifanmuzny.workers.dev

media_folder: "assets/gems"
public_folder: "/assets/gems"

collections:
  - name: "products"
    label: "Gem Products"
    files:
      - name: "products"
        label: "Products List"
        file: "data/products.json"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Gem Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string", required: false }
              - { label: "Weight", name: "weight", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Status", name: "status", widget: "select", options: ["Available", "Sold", "Out of Stock"] }
              - { label: "Image", name: "image", widget: "image" }
